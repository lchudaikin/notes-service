services:
  postgres:
    image: postgres:18
    container_name: notes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - notes_pgdata:/var/lib/postgresql

volumes:
  notes_pgdata: